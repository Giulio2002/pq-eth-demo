[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
extra_output = ["storageLayout"]
skip = ["src/v3/**"]
fs_permissions = [{ access = "read-write", path = "./" }, { access = "read-write", path = "../" }]
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@uniswap/v3-core/=lib/v3-core/",
  "@uniswap/v3-periphery/=lib/v3-periphery/",
]

[profile.v3]
src = "src/v3"
out = "out/v3"
test = "src/v3"
script = "src/v3"
libs = ["lib"]
solc = "0.7.6"
skip = []
via_ir = false
extra_output = []
optimizer = true
optimizer_runs = 200
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts-v3/contracts/",
  "@uniswap/v3-core/=lib/v3-core/",
  "@uniswap/v3-periphery/=lib/v3-periphery/",
]

[profile.v3core]
src = "src/v3"
out = "out/v3core"
test = "src/v3"
script = "src/v3"
libs = ["lib"]
solc = "0.7.6"
skip = []
via_ir = false
extra_output = []
optimizer = true
optimizer_runs = 200
remappings = [
  "@uniswap/v3-core/=lib/v3-core/",
]
