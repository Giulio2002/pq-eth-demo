# Root-level redirect — the real Foundry config is in contracts/foundry.toml
# This file exists because Foundry uses the git root as project root.
# All forge commands should be run from contracts/ with --root .
[profile.default]
src = "contracts/src"
out = "contracts/out"
libs = ["contracts/lib", "lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
extra_output = ["storageLayout"]
skip = ["contracts/src/v3/**"]
test = "contracts/test"
script = "contracts/script"
remappings = [
  "@openzeppelin/contracts/=contracts/lib/openzeppelin-contracts/contracts/",
  "@uniswap/v3-core/=lib/v3-core/",
  "@uniswap/v3-periphery/=lib/v3-periphery/",
]

[profile.v3]
src = "contracts/src/v3"
out = "contracts/out/v3"
test = "contracts/src/v3"
script = "contracts/src/v3"
libs = ["contracts/lib", "lib"]
solc = "0.7.6"
skip = []
via_ir = false
extra_output = []
optimizer = true
optimizer_runs = 200
remappings = [
  "@openzeppelin/contracts/=contracts/lib/openzeppelin-contracts/contracts/",
  "@uniswap/v3-core/=lib/v3-core/",
  "@uniswap/v3-periphery/=lib/v3-periphery/",
]
